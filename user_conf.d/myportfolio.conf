map $request_method $limit_post { # we only set to POST so that we don't apply ratelimit on GETs of timeline_post
    POST $binary_remote_addr;
    default "";
}

limit_req_zone $limit_post zone=timeline_post:10m rate=1r/m;

server {
    listen 80;
    server_name prasantkoi.duckdns.org;

    if ($host = prasantkoi.duckdns.org) {
        return 301 https://$host$request_uri;
    } 
}

server {
    listen 443 ssl;
    server_name prasantkoi.duckdns.org;

    location = /api/timeline_post {
        limit_req zone=timeline_post;
        limit_req_status 429;
        proxy_pass http://myportfolio:5000/api/timeline_post;
    }

    location / {
        proxy_pass http://myportfolio:5000/;
    }

    # load certificate files
    ssl_certificate /etc/letsencrypt/live/myportfolio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myportfolio/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;
}